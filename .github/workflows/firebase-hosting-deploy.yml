name: Deploy to Firebase Hosting

# Builds the web app and deploys it to Firebase Hosting (production channel)
# on every push to master, and on manual trigger. No local build / no Blaze
# plan needed — only Hosting is deployed.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shumoukh-roof
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shumoukh-roof/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHUMUKH_9011F }}
          channelId: live
          projectId: shumukh-9011f
          entryPoint: shumoukh-roof
